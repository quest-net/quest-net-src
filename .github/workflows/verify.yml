name: Verify

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.96.0 --profile minimal --target wasm32-unknown-unknown

      - name: Install pinned wasm-pack
        run: cargo +1.96.0 install wasm-pack --version 0.15.0 --locked

      - name: Verify committed WASM package
        run: npm run check:wasm

      - name: Build app
        run: npm run build
